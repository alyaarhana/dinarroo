        <div class="section_w480">
        <h2>Silahkan Login untuk melanjutkan</h2>
            <div class="login_box">
                <form class="login_form" action="#" method="post" onsubmit="return loginSimulation();">
                    <label>Nama Pengguna</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username..." />
                    <label>Kata Sandi</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan kata sandi..." />

<script type="text/javascript">
function loginSimulation() {
    localStorage.setItem('loggedIn', 'true');
    window.location.href = 'index.html';
    return false;
}
function updateNav() {
    var logged = localStorage.getItem('loggedIn') === 'true';
    var loginLink = document.getElementById('nav-login');
    var logoutLink = document.getElementById('nav-logout');
    if (loginLink) {
        loginLink.style.display = logged ? 'none' : 'inline-block';
    }
    if (logoutLink) {
        logoutLink.style.display = logged ? 'inline-block' : 'none';
        if (logged) {
            logoutLink.onclick = function(event) {
                event.preventDefault();
                localStorage.removeItem('loggedIn');
                window.location.href = 'index.html';
            };
        }
    }
}
updateNav();
</script>
</body>
